name: Update Quote in index.html

on:
  schedule:
    - cron: "*/1 * * * *"  # Every 1 minute
  workflow_dispatch:       # Allow manual trigger

jobs:
  update-quote:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Python (for script to update HTML)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # Step 3: Create and run Python script to update index.html
      - name: Update index.html with random quote
        run: |
          import random

          quotes = [
              "The best way to get started is to quit talking and begin doing.",
              "Don’t let yesterday take up too much of today.",
              "It’s not whether you get knocked down, it’s whether you get up.",
              "If you are working on something exciting, it will keep you motivated.",
              "Success is not in what you have, but who you are."
          ]

          # Read HTML file
          with open("index.html", "r", encoding="utf-8") as f:
              html = f.read()

          # Replace placeholder <!--QUOTE--> with a random quote
          new_html = html.replace("<!--QUOTE-->", random.choice(quotes))

          # Save updated HTML
          with open("index.html", "w", encoding="utf-8") as f:
              f.write(new_html)

      # Step 4: Commit and push changes
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Update quote in index.html" || echo "No changes to commit"
          git push
