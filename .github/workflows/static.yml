name: Deploy static content to Pages with Quotes

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "*/1 * * * *"  # Every 1 minute
  workflow_dispatch:

permissions:
  contents: write   # changed to write so we can commit changes
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update index.html with random quote
        run: |
          import random

          quotes = [
              "The best way to get started is to quit talking and begin doing.",
              "Don’t let yesterday take up too much of today.",
              "It’s not whether you get knocked down, it’s whether you get up.",
              "If you are working on something exciting, it will keep you motivated.",
              "Success is not in what you have, but who you are."
          ]

          # Read HTML
          with open("index.html", "r", encoding="utf-8") as f:
              html = f.read()

          # Replace placeholder <!--QUOTE--> with a random quote
          new_html = html.replace("<!--QUOTE-->", random.choice(quotes))

          # Save updated HTML
          with open("index.html", "w", encoding="utf-8") as f:
              f.write(new_html)

      - name: Commit updated index.html
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Update quote in index.html" || echo "No changes to commit"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
